<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Guardian Profiel – GuardianHQ</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<nav>
  <div class="nav-inner">
    <a href="index.html" class="logo"><div class="logo-hex">G</div><span class="logo-t">GuardianHQ</span></a>
    <div class="nav-links">
      <a href="index.html" class="nav-a">Home</a>
      <a href="profile.html" class="nav-a active">Profiel</a>
      <a href="weapons.html" class="nav-a">Wapens</a>
      <a href="seasonal.html" class="nav-a">Seizoen</a>
      <a href="raids.html" class="nav-a">Raids</a>
      <a href="contact.html" class="nav-a">Contact</a>
    </div>
    <div class="nav-search">
      <span>🔍</span>
      <input id="main-search" placeholder="Zoek Guardian..." type="text">
    </div>
    <div class="nav-btns" id="nav-btns"></div>
  </div>
</nav>

<div class="prof-header">
  <div class="prof-header-in">
    <div class="prof-av">🗡️</div>
    <div>
      <div class="prof-nm" id="profile-gamertag">Guardian</div>
      <div class="prof-plat">Bungie.net · Destiny 2</div>
      <div class="prof-badges">
        <span class="cbadge b-hunter">Hunter</span>
        <span class="cbadge b-warlock">Warlock</span>
        <span class="cbadge b-titan">Titan</span>
      </div>
    </div>
    <div class="prof-meta">
      <div class="prof-pow" id="profile-power">—</div>
      <div class="prof-pow-l">Max Light Level</div>
    </div>
  </div>
</div>

<div class="sec">
  <div class="sec-in">
    <div id="profile-content">
      <div style="text-align:center;padding:80px;color:var(--t3)">
        <div style="font-size:48px;margin-bottom:16px">🔍</div>
        <div style="font-family:var(--fd);font-size:22px;letter-spacing:1px;text-transform:uppercase;margin-bottom:10px">Zoek een Guardian</div>
        <div style="font-size:14px;color:var(--t3);margin-bottom:24px">Voer een Bungie gamertag in de zoekbalk in, of log in om je eigen profiel te zien.</div>
        <a href="login.html" class="btn btn-p">🔑 Inloggen</a>
      </div>
    </div>
  </div>
</div>

<footer>
  <div class="foot-in">
    <div class="foot-bot">
      <div class="foot-copy">© 2025 GuardianHQ · Niet gelieerd aan Bungie, Inc.</div>
    </div>
  </div>
</footer>

<script src="js/app.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  if (!Auth.isLoggedIn()) {
    document.getElementById('profile-content').innerHTML = `
      <div style="text-align:center;padding:80px;color:var(--t3)">
        <div style="font-size:48px;margin-bottom:16px">🔒</div>
        <div style="font-family:var(--fd);font-size:26px;letter-spacing:1px;text-transform:uppercase;margin-bottom:10px">Login Vereist</div>
        <div style="font-size:14px;color:var(--t3);margin-bottom:24px">Je hebt een account nodig om Guardian-profielen te bekijken.</div>
        <div style="display:flex;gap:10px;justify-content:center">
          <a href="login.html" class="btn btn-p">🔑 Inloggen</a>
          <a href="register.html" class="btn btn-g">🚀 Account Aanmaken</a>
        </div>
      </div>`;
    return;
  }
  initProfile();
});
</script>
</body>
</html>
