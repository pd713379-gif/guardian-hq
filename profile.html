<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Guardian Profile – GuardianHQ</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<nav>
  <div class="nav-inner">
    <a href="index.html" class="logo"><div class="logo-hex">G</div><span class="logo-t">GuardianHQ</span></a>
    <div class="nav-links">
      <a href="index.html" class="nav-a" data-en="Home" data-nl="Home">Home</a>
      <a href="profile.html" class="nav-a active" data-en="Profile" data-nl="Profiel">Profile</a>
      <a href="destiny.html" class="nav-a" data-en="Destiny 2" data-nl="Destiny 2">Destiny 2</a>
      <a href="weapons.html" class="nav-a" data-en="Weapons" data-nl="Wapens">Weapons</a>
      <a href="seasonal.html" class="nav-a" data-en="Season" data-nl="Seizoen">Season</a>
      <a href="raids.html" class="nav-a" data-en="Raids" data-nl="Raids">Raids</a>
      <a href="contact.html" class="nav-a" data-en="Contact" data-nl="Contact">Contact</a>
    </div>
    <div class="nav-search">
      <span>🔍</span>
      <input id="main-search" placeholder="Search Guardian (RemainsNL#6718)..." type="text">
    </div>
    <div class="nav-btns" id="nav-btns">
      <button class="btn btn-out" id="lang-btn" onclick="toggleLang()" style="min-width:42px">🌐 NL</button>
    </div>
  </div>
</nav>

<div class="prof-header">
  <div class="prof-header-in">
    <div class="prof-av" id="prof-av">👤</div>
    <div>
      <div class="prof-nm" id="profile-gamertag">Guardian</div>
      <div class="prof-plat" id="profile-platform">Bungie.net · Destiny 2</div>
      <div class="prof-badges" id="profile-badges"></div>
    </div>
    <div class="prof-meta">
      <div class="prof-pow" id="profile-power">—</div>
      <div class="prof-pow-l" data-en="Max Light Level" data-nl="Max Light Level">Max Light Level</div>
    </div>
  </div>
</div>

<div class="sec">
  <div class="sec-in">
    <div id="profile-content">
      <div style="text-align:center;padding:80px;color:var(--t3)">
        <div style="font-size:48px;margin-bottom:16px">🔍</div>
        <div style="font-family:var(--fd);font-size:22px;letter-spacing:1px;text-transform:uppercase;margin-bottom:10px" id="search-hint">Search a Guardian</div>
        <div style="font-size:14px;color:var(--t3);margin-bottom:24px" id="search-sub">Enter a Bungie gamertag in the search bar above (e.g. RemainsNL#6718)</div>
      </div>
    </div>
  </div>
</div>

<footer>
  <div class="foot-in">
    <div class="foot-bot">
      <div class="foot-copy">© 2026 GuardianHQ · Not affiliated with Bungie, Inc.</div>
    </div>
  </div>
</footer>

<script>
const PROFILE_API_KEY = '9ad034ae0ea641e6886c7c33f3911093';
const BUNGIE  = 'https://www.bungie.net/Platform';
let currentLang = localStorage.getItem('ghq_lang') || 'en';

function applyLang() {
  document.documentElement.lang = currentLang;
  const lb = document.getElementById('lang-btn');
  if (lb) lb.textContent = currentLang === 'en' ? '🌐 NL' : '🌐 EN';
  document.querySelectorAll('[data-en]').forEach(el => {
    el.textContent = currentLang === 'nl' ? el.dataset.nl : el.dataset.en;
  });
  const inp = document.getElementById('main-search');
  if (inp) inp.placeholder = currentLang === 'nl' ? 'Zoek Guardian (RemainsNL#6718)...' : 'Search Guardian (RemainsNL#6718)...';
  const hint = document.getElementById('search-hint');
  if (hint) hint.textContent = currentLang === 'nl' ? 'Zoek een Guardian' : 'Search a Guardian';
  const sub = document.getElementById('search-sub');
  if (sub) sub.textContent = currentLang === 'nl' ? 'Voer een Bungie gamertag in de zoekbalk in (bijv. RemainsNL#6718)' : 'Enter a Bungie gamertag in the search bar above (e.g. RemainsNL#6718)';
}

function toggleLang() {
  currentLang = currentLang === 'en' ? 'nl' : 'en';
  localStorage.setItem('ghq_lang', currentLang);
  applyLang();
}

async function bget(path) {
  const r = await fetch(BUNGIE + path, { headers: { 'X-API-Key': PROFILE_API_KEY } });
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return await r.json();
}

async function searchGuardian(gt) {
  const content = document.getElementById('profile-content');
  const loading = currentLang === 'nl' ? 'Guardian ophalen...' : 'Loading Guardian...';
  content.innerHTML = `<div style="text-align:center;padding:60px;color:var(--t2)">
    <div style="font-size:36px;margin-bottom:12px">🔍</div>
    <div style="font-family:var(--fd);font-size:18px;letter-spacing:1px;text-transform:uppercase">${loading}</div>
  </div>`;

  document.getElementById('profile-gamertag').textContent = gt;

  try {
    // Use our own Vercel API proxy to avoid CORS issues with Bungie's POST endpoint
    const searchRes = await fetch('/api/search-guardian?name=' + encodeURIComponent(gt));

    if (!searchRes.ok) {
      const err = await searchRes.json().catch(() => ({}));
      if (searchRes.status === 404) {
        content.innerHTML = `<div style="text-align:center;padding:60px;color:var(--t3)">
          <div style="font-size:40px;margin-bottom:14px">⚠️</div>
          <div style="font-family:var(--fd);font-size:22px;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px">
            ${currentLang==='nl'?'GUARDIAN NIET GEVONDEN':'GUARDIAN NOT FOUND'}
          </div>
          <div style="font-size:13px;color:var(--t3);margin-bottom:20px">
            ${currentLang==='nl'?'Controleer de gamertag. Probeer bijv. RemainsNL#6718':'Check the gamertag. Try e.g. RemainsNL#6718'}
          </div>
        </div>`;
        return;
      }
      throw new Error(err.error || 'Search failed');
    }

    const searchData = await searchRes.json();
    if (!searchData?.member) {
      content.innerHTML = `<div style="text-align:center;padding:60px;color:var(--t3)">
        <div style="font-size:40px;margin-bottom:14px">⚠️</div>
        <div style="font-family:var(--fd);font-size:22px;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px">
          ${currentLang==='nl'?'GUARDIAN NIET GEVONDEN':'GUARDIAN NOT FOUND'}
        </div>
      </div>`;
      return;
    }

    await renderProfile(searchData.member, gt);

  } catch(err) {
    console.error('Search error:', err);
    content.innerHTML = `<div style="text-align:center;padding:60px;color:var(--t3)">
      <div style="font-size:40px;margin-bottom:14px">❌</div>
      <div style="font-family:var(--fd);font-size:18px;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px">
        ${currentLang==='nl'?'Verbindingsfout':'Connection Error'}
      </div>
      <div style="font-size:13px;color:var(--t3)">${err.message}</div>
    </div>`;
  }
}

async function renderProfile(member, gt) {
  const content = document.getElementById('profile-content');
  const platNames = {1:'Xbox',2:'PSN',3:'Steam',254:'BNet'};
  const clsNames  = {0:'Titan',1:'Hunter',2:'Warlock'};
  const clsIcons  = {0:'🛡️',1:'🗡️',2:'📚'};
  const clsBadge  = {0:'b-titan',1:'b-hunter',2:'b-warlock'};

  document.getElementById('profile-platform').textContent =
    `${platNames[member.membershipType]||'Bungie'} · Destiny 2`;

  const profileRes = await fetch(
    `/api/profile-guardian?membershipType=${member.membershipType}&membershipId=${member.membershipId}`
  );
  const profile = await profileRes.json();

  const chars = profile?.Response?.characters?.data;
  if (!chars || !Object.keys(chars).length) {
    content.innerHTML = `<div style="text-align:center;padding:60px;color:var(--t3)">
      <div style="font-size:40px;margin-bottom:14px">🔒</div>
      <div style="font-family:var(--fd);font-size:18px;letter-spacing:1px;text-transform:uppercase">
        ${currentLang==='nl'?'Profiel is privé':'Profile is private'}
      </div>
    </div>`;
    return;
  }

  const maxLight = Math.max(...Object.values(chars).map(c => c.light || 0));
  document.getElementById('profile-power').textContent = maxLight || '—';

  const badges = [...new Set(Object.values(chars).map(c => c.classType))];
  document.getElementById('profile-badges').innerHTML = badges.map(b =>
    `<span class="cbadge ${clsBadge[b]||''}">${clsNames[b]||'Guardian'}</span>`).join('');

  let html = `<div class="stats-ov">
    <div class="stcard hl">
      <div class="stcard-l">Gamertag</div>
      <div class="stcard-v" style="font-size:15px">${member.bungieGlobalDisplayName || gt}</div>
    </div>
    <div class="stcard">
      <div class="stcard-l">${currentLang==='nl'?'Platform':'Platform'}</div>
      <div class="stcard-v" style="font-size:15px">${platNames[member.membershipType]||'Bungie'}</div>
    </div>
    <div class="stcard">
      <div class="stcard-l">Characters</div>
      <div class="stcard-v">${Object.keys(chars).length}</div>
    </div>
    <div class="stcard">
      <div class="stcard-l">Max Light</div>
      <div class="stcard-v" style="color:var(--gold)">${maxLight}</div>
    </div>
  </div>`;

  html += `<div class="tbl-wrap" style="margin-top:20px">
    <div class="tbl-head"><span class="tbl-title">⚔️ Characters</span></div>
    <table><thead><tr>
      <th>Class</th>
      <th>Light</th>
      <th>Race</th>
      <th>${currentLang==='nl'?'Speeltijd':'Playtime'}</th>
      <th>${currentLang==='nl'?'Laatste Login':'Last Played'}</th>
    </tr></thead><tbody>`;

  Object.values(chars).sort((a,b)=>(b.light||0)-(a.light||0)).forEach(c => {
    const race = c.raceType===0?(currentLang==='nl'?'Mens':'Human'):c.raceType===1?'Awoken':'Exo';
    const hrs  = Math.floor((c.minutesPlayedTotal||0)/60);
    const last = c.dateLastPlayed
      ? new Date(c.dateLastPlayed).toLocaleDateString(currentLang==='nl'?'nl-NL':'en-US')
      : '—';
    html += `<tr>
      <td><div class="iname">
        <div class="iico" style="background:rgba(79,195,247,.1)">${clsIcons[c.classType]||'👤'}</div>
        <div><div class="inm">${clsNames[c.classType]||'Guardian'}</div><div class="ityp">${race}</div></div>
      </div></td>
      <td><span style="font-family:var(--fd);font-size:22px;font-weight:700;color:var(--gold)">${c.light||'?'}</span></td>
      <td>${race}</td>
      <td>${hrs} ${currentLang==='nl'?'uur':'hrs'}</td>
      <td style="font-size:12px;color:var(--t3)">${last}</td>
    </tr>`;
  });

  html += '</tbody></table></div>';
  content.innerHTML = html;
}

document.addEventListener('DOMContentLoaded', () => {
  applyLang();

  // Nav update
  const user = sessionStorage.getItem('ghq_user');
  const nb = document.getElementById('nav-btns');
  if (nb) {
    if (user) {
      try {
        const u = JSON.parse(user);
        nb.innerHTML = `
          <span style="font-family:var(--fu);font-size:13px;color:var(--t2);padding:0 6px">${u.username||''}</span>
          <a href="profile.html" class="btn btn-p">👤 ${currentLang==='nl'?'Profiel':'Profile'}</a>
          <button class="btn btn-out" onclick="sessionStorage.removeItem('ghq_user');window.location.href='index.html'">
            ${currentLang==='nl'?'Uitloggen':'Logout'}
          </button>
          <button class="btn btn-out" id="lang-btn" onclick="toggleLang()" style="min-width:42px">🌐 ${currentLang==='en'?'NL':'EN'}</button>`;
      } catch {}
    }
  }

  const inp = document.getElementById('main-search');
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter' && inp.value.trim()) searchGuardian(inp.value.trim());
  });

  // URL param
  const gt = new URLSearchParams(location.search).get('gt');
  if (gt) { inp.value = gt; searchGuardian(gt); }
  else if (user) {
    try {
      const u = JSON.parse(user);
      if (u.gamertag) { inp.value = u.gamertag; searchGuardian(u.gamertag); }
    } catch {}
  }
});
</script>
<script src="js/app.js"></script>
</body>
</html>
