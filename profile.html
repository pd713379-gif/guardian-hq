<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Guardian Profile – GuardianHQ</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<nav>
  <div class="nav-inner">
    <a href="index.html" class="logo"><div class="logo-hex">G</div><span class="logo-t">GuardianHQ</span></a>
    <div class="nav-links">
      <a href="index.html" class="nav-a" data-en="Home" data-nl="Home">Home</a>
      <a href="profile.html" class="nav-a active" data-en="Profile" data-nl="Profiel">Profile</a>
      <a href="destiny.html" class="nav-a" data-en="Destiny 2" data-nl="Destiny 2">Destiny 2</a>
      <a href="weapons.html" class="nav-a" data-en="Weapons" data-nl="Wapens">Weapons</a>
      <a href="seasonal.html" class="nav-a" data-en="Season" data-nl="Seizoen">Season</a>
      <a href="raids.html" class="nav-a" data-en="Raids" data-nl="Raids">Raids</a>
      <a href="contact.html" class="nav-a" data-en="Contact" data-nl="Contact">Contact</a>
    </div>
    <div class="nav-search">
      <span>🔍</span>
      <input id="main-search" placeholder="Search Guardian (name#1234)..." type="text">
    </div>
    <div class="nav-btns" id="nav-btns">
      <button class="btn btn-out" id="lang-btn" onclick="toggleLang()" style="min-width:42px">🌐 NL</button>
    </div>
  </div>
</nav>

<div class="prof-header">
  <div class="prof-header-in">
    <div class="prof-av" id="prof-av">👤</div>
    <div>
      <div class="prof-nm" id="profile-gamertag">Guardian</div>
      <div class="prof-plat" id="profile-platform">Bungie.net · Destiny 2</div>
      <div class="prof-badges" id="profile-badges"></div>
    </div>
    <div class="prof-meta">
      <div class="prof-pow" id="profile-power">—</div>
      <div class="prof-pow-l" data-en="Max Light Level" data-nl="Max Light Level">Max Light Level</div>
    </div>
  </div>
</div>

<div class="sec">
  <div class="sec-in">
    <div id="profile-content">
      <div style="text-align:center;padding:80px;color:var(--t3)">
        <div style="font-size:48px;margin-bottom:16px">🔍</div>
        <div style="font-family:var(--fd);font-size:22px;letter-spacing:1px;text-transform:uppercase;margin-bottom:10px" data-en="Search a Guardian" data-nl="Zoek een Guardian">Search a Guardian</div>
        <div style="font-size:14px;color:var(--t3);margin-bottom:24px" data-en="Enter a Bungie gamertag above (e.g. RemainsNL#6718)" data-nl="Voer een gamertag in de zoekbalk in (bijv. RemainsNL#6718)">Enter a Bungie gamertag above (e.g. RemainsNL#6718)</div>
      </div>
    </div>
  </div>
</div>

<footer>
  <div class="foot-in">
    <div class="foot-bot">
      <div class="foot-copy">© 2026 GuardianHQ · Not affiliated with Bungie, Inc.</div>
    </div>
  </div>
</footer>

<script>
const API_KEY = '9ad034ae0ea641e6886c7c33f3911093';
const BUNGIE  = 'https://www.bungie.net/Platform';
let currentLang = localStorage.getItem('ghq_lang') || 'en';

function applyLang() {
  document.documentElement.lang = currentLang;
  if (document.getElementById('lang-btn')) document.getElementById('lang-btn').textContent = currentLang==='en'?'🌐 NL':'🌐 EN';
  document.querySelectorAll('[data-en]').forEach(el => { el.textContent = currentLang==='nl'?el.dataset.nl:el.dataset.en; });
  document.getElementById('main-search').placeholder = currentLang==='nl'?'Zoek Guardian (naam#1234)...':'Search Guardian (name#1234)...';
}
function toggleLang() { currentLang=currentLang==='en'?'nl':'en'; localStorage.setItem('ghq_lang',currentLang); applyLang(); }

async function bget(path) {
  const r = await fetch(BUNGIE+path, { headers:{'X-API-Key':API_KEY} });
  return await r.json();
}

async function searchGuardian(gt) {
  const content = document.getElementById('profile-content');
  document.getElementById('profile-gamertag').textContent = gt;

  content.innerHTML = `<div style="text-align:center;padding:60px;color:var(--t2)">
    <div style="font-size:36px;margin-bottom:12px">🔍</div>
    <div style="font-family:var(--fd);font-size:18px;letter-spacing:1px;text-transform:uppercase">
      ${currentLang==='nl'?'Guardian ophalen...':'Loading Guardian...'}
    </div>
  </div>`;

  try {
    // Use POST SearchByBungieName via our proxy to avoid CORS
    // BUT since we don't have backend - use the GET search which works
    // Encode # as %23 and search all platforms (-1)
    const encoded = encodeURIComponent(gt);
    const data = await bget(`/Destiny2/SearchDestinyPlayer/-1/${encoded}/`);

    if (!data?.Response?.length) {
      // Try without the # part (just the name)
      const name = gt.split('#')[0];
      const data2 = await bget(`/Destiny2/SearchDestinyPlayer/-1/${encodeURIComponent(name)}/`);

      if (!data2?.Response?.length) {
        content.innerHTML = `<div style="text-align:center;padding:60px;color:var(--t3)">
          <div style="font-size:40px;margin-bottom:14px">⚠️</div>
          <div style="font-family:var(--fd);font-size:22px;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px">
            ${currentLang==='nl'?'GUARDIAN NIET GEVONDEN':'GUARDIAN NOT FOUND'}
          </div>
          <div style="font-size:13px;color:var(--t3)">
            ${currentLang==='nl'?'Probeer alleen de naam zonder #code, bijv: RemainsNL':'Try name only without #code, e.g: RemainsNL'}
          </div>
        </div>`;
        return;
      }
      await showProfile(data2.Response[0], gt, content);
      return;
    }

    await showProfile(data.Response[0], gt, content);

  } catch(err) {
    console.error(err);
    content.innerHTML = `<div style="text-align:center;padding:60px;color:var(--t3)">
      <div style="font-size:40px;margin-bottom:14px">❌</div>
      <div style="font-family:var(--fd);font-size:18px;text-transform:uppercase;margin-bottom:8px">
        ${currentLang==='nl'?'Verbindingsfout':'Connection Error'}
      </div>
      <div style="font-size:13px;color:var(--t3)">${err.message}</div>
    </div>`;
  }
}

async function showProfile(m, gt, content) {
  const platNames = {1:'Xbox',2:'PSN',3:'Steam',254:'BNet'};
  const clsNames  = {0:'Titan',1:'Hunter',2:'Warlock'};
  const clsIcons  = {0:'🛡️',1:'🗡️',2:'📚'};
  const clsBadge  = {0:'b-titan',1:'b-hunter',2:'b-warlock'};

  document.getElementById('profile-platform').textContent = `${platNames[m.membershipType]||'Bungie'} · Destiny 2`;

  const profile = await bget(`/Destiny2/${m.membershipType}/Profile/${m.membershipId}/?components=100,200`);
  const chars = profile?.Response?.characters?.data;

  if (!chars) {
    content.innerHTML = `<div style="text-align:center;padding:60px;color:var(--t3)">
      ${currentLang==='nl'?'Profiel is privé of heeft geen data.':'Profile is private or has no data.'}
    </div>`;
    return;
  }

  const maxLight = Math.max(...Object.values(chars).map(c => c.light||0));
  document.getElementById('profile-power').textContent = maxLight||'—';

  const badges = [...new Set(Object.values(chars).map(c=>c.classType))];
  document.getElementById('profile-badges').innerHTML = badges.map(b =>
    `<span class="cbadge ${clsBadge[b]||''}">${clsNames[b]||'Guardian'}</span>`).join('');

  let html = `<div class="stats-ov">
    <div class="stcard hl"><div class="stcard-l">Gamertag</div><div class="stcard-v" style="font-size:15px">${gt}</div></div>
    <div class="stcard"><div class="stcard-l">${currentLang==='nl'?'Platform':'Platform'}</div><div class="stcard-v" style="font-size:15px">${platNames[m.membershipType]||'Bungie'}</div></div>
    <div class="stcard"><div class="stcard-l">${currentLang==='nl'?'Characters':'Characters'}</div><div class="stcard-v">${Object.keys(chars).length}</div></div>
    <div class="stcard hl"><div class="stcard-l">${currentLang==='nl'?'Max Light':'Max Light'}</div><div class="stcard-v">${maxLight}</div></div>
  </div>

  <div class="tbl-wrap" style="margin-top:20px">
    <div class="tbl-head"><span class="tbl-title">⚔️ Characters</span></div>
    <table><thead><tr>
      <th>Class</th>
      <th>Light Level</th>
      <th>Race</th>
      <th>${currentLang==='nl'?'Speeltijd':'Playtime'}</th>
      <th>${currentLang==='nl'?'Laatste login':'Last played'}</th>
    </tr></thead><tbody>`;

  Object.values(chars).sort((a,b)=>(b.light||0)-(a.light||0)).forEach(c => {
    const race = c.raceType===0?(currentLang==='nl'?'Mens':'Human'):c.raceType===1?'Awoken':'Exo';
    const hrs  = Math.floor((c.minutesPlayedTotal||0)/60);
    const last = c.dateLastPlayed ? new Date(c.dateLastPlayed).toLocaleDateString(currentLang==='nl'?'nl-NL':'en-US') : '—';
    html += `<tr>
      <td><div class="iname">
        <div class="iico" style="background:rgba(79,195,247,.1)">${clsIcons[c.classType]||'👤'}</div>
        <div><div class="inm">${clsNames[c.classType]||'Guardian'}</div><div class="ityp">${race}</div></div>
      </div></td>
      <td><span style="font-family:var(--fd);font-size:22px;font-weight:700;color:var(--gold)">${c.light||'?'}</span></td>
      <td>${race}</td>
      <td>${hrs} ${currentLang==='nl'?'uur':'hrs'}</td>
      <td style="font-size:12px;color:var(--t3)">${last}</td>
    </tr>`;
  });

  html += '</tbody></table></div>';
  content.innerHTML = html;
}

document.addEventListener('DOMContentLoaded', () => {
  applyLang();

  const inp = document.getElementById('main-search');
  inp.addEventListener('keydown', e => {
    if (e.key==='Enter' && inp.value.trim()) searchGuardian(inp.value.trim());
  });

  const params = new URLSearchParams(location.search);
  const gt = params.get('gt');
  if (gt) { inp.value = gt; searchGuardian(gt); return; }

  // Auto load logged in user
  try {
    const u = JSON.parse(sessionStorage.getItem('ghq_user')||'{}');
    if (u?.gamertag) { inp.value = u.gamertag; searchGuardian(u.gamertag); }
  } catch {}
});
</script>
<script src="js/app.js"></script>
</body>
</html>
