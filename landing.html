<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Test Pagina</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      background: gray; /* Tijdelijk grijs om te zien of de pagina laadt */
      overflow: hidden;
    }

    .fullscreen-image {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      object-position: center 0%;
    }
  </style>
</head>

<body>
  <!-- Ik heb hier een test-afbeelding geplaatst om te kijken of je code werkt -->
  <img 
    class="fullscreen-image"
    src="https://picsum.photos"
    alt="Test Image"
  />
</body>
</html>
