<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Under Construction</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      background: black;
      overflow: hidden;
    }

    .fullscreen-image {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      /* 'cover' zorgt dat het scherm altijd volledig gevuld is */
      object-fit: cover; 
      object-position: center;
    }
  </style>
</head>

<body>
  <img 
    class="fullscreen-image"
    src="https://guardian-hq-eight.vercel.app/img/under_construction.webp"
    alt="Under Construction"
  />
</body>
</html>
