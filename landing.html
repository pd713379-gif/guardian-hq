<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Under Construction</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      background: black; /* Achtergrondkleur voor als de foto laadt */
      overflow: hidden;
    }

    .fullscreen-image {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      /* 'cover' vult het hele scherm zonder zwarte balken */
      object-fit: cover; 
      /* 'center 0%' zorgt dat de kranen aan de bovenkant altijd zichtbaar blijven */
      object-position: center 0%;
    }
  </style>
</head>

<body>
  <img 
    class="fullscreen-image"
    src="https://vercel.app"
    alt="Under Construction"
  />
</body>
</html>
